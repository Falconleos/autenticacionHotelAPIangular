<h2>{{ isAssignMode ? 'Asignar Empleo' : 'Modificar Empleado' }}</h2>

<!-- Información de lectura del usuario vinculado -->
<div>
  <p><strong>Usuario:</strong> {{ userFullName }}</p>
  <p><strong>Email:</strong> {{ userEmail }}</p>
  <p><strong>Rol asignado:</strong> {{ userRole }}</p>
</div>

<hr />

<!-- Formulario para Shift y Salary -->
<form (submit)="saveEmployee()">
  <div>
    <label>Turno:</label>
    <select [(ngModel)]="shift" name="shift" required>
      <option *ngFor="let s of shifts" [value]="s">
        {{ s }}
      </option>
    </select>
  </div>

  <div>
    <label>Sueldo:</label>
    <input type="number" [(ngModel)]="salary" name="salary" min="1" step="0.01" required>
  </div>

  <br>
  <button type="submit">{{ isAssignMode ? 'Asignar Empleo' : 'Guardar Cambios' }}</button>
  <button type="button" (click)="cancel()">Cancelar</button>
</form>
