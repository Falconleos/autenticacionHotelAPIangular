<div class="login-container">
  <div class="login-card user-form-card">
    
    <!-- Botón para volver atrás -->
    <div class="top-nav-bar">
      <button routerLink="/usuarios" class="btn-back" title="Volver a la lista de usuarios">
        ⬅️ Volver
      </button>
    </div>

    <h2>{{ isEditMode ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
    <p class="subtitle">{{ isEditMode ? 'Modificar datos del sistema' : 'Registrar nuevo personal' }}</p>

    <!-- Alerta de Error Dinámica (por si se usa en el TS) -->
    @if (errorMessage) {
      <div class="alert-error">
        {{ errorMessage }}
      </div>
    }

    <form (submit)="saveUser()">
      <div class="form-group">
        <label>Nombre:</label>
        <input type="text" [(ngModel)]="newUser.name" name="name" required>
      </div>
      
      <div class="form-group">
        <label>Apellido:</label>
        <input type="text" [(ngModel)]="newUser.surname" name="surname" required>
      </div>

      <div class="form-group">
        <label>DNI:</label>
        <input type="text" [(ngModel)]="newUser.dni" name="dni" required>
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" [(ngModel)]="newUser.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Username:</label>
        <input type="text" [(ngModel)]="newUser.username" name="username" required>
      </div>
      
      <!-- La contraseña solo se solicita al crear un nuevo usuario -->
      <div class="form-group" *ngIf="!isEditMode">
        <label>Password:</label> 
        <input type="password" [(ngModel)]="newUser.password" name="password" required>
      </div>

      <div class="form-group">
        <label>Teléfono:</label>
        <input type="text" [(ngModel)]="newUser.phoneNumber" name="phoneNumber" required>
      </div>

      <div class="form-group">
        <label>Fecha Nacimiento:</label>
        <input type="date" [(ngModel)]="newUser.birthDay" name="birthDay">
      </div>
      
      <!-- Selección de roles dinámicos filtrados desde el componente -->
      <div class="form-group" *ngIf="!isEditMode">
        <label>Rol:</label>
        <select [(ngModel)]="newUser.role" name="role" required class="form-select">
          <option *ngFor="let role of availableRoles" [value]="role.value">
            {{ role.label }}
          </option>
        </select>
      </div>

      <button type="submit" class="btn-submit">
        {{ isEditMode ? 'Actualizar Cambios' : 'Guardar Usuario' }}
      </button>
    </form>

  </div>
</div>
