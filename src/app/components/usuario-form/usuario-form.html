<form (submit)="saveUser()">
  <!-- Campos existentes -->
  <div><label>Nombre:</label> <input type="text" [(ngModel)]="newUser.name" name="name" required></div>
  <div><label>Apellido:</label> <input type="text" [(ngModel)]="newUser.surname" name="surname" required></div>
  <div><label>DNI:</label> <input type="text" [(ngModel)]="newUser.dni" name="dni" required></div>
  <div><label>Email:</label> <input type="email" [(ngModel)]="newUser.email" name="email" required></div>

  <!-- Nuevos campos requeridos por el backend -->
  <div><label>Username:</label> <input type="text" [(ngModel)]="newUser.username" name="username" required></div>
  <div><label>Password:</label> <input type="password" [(ngModel)]="newUser.password" name="password" required></div>
  <div><label>Teléfono:</label> <input type="text" [(ngModel)]="newUser.phoneNumber" name="phoneNumber" required></div>
  <div><label>Fecha Nacimiento:</label> <input type="date" [(ngModel)]="newUser.birthDay" name="birthDay"></div>
  <div>
    <label>Rol:</label>
    <select [(ngModel)]="newUser.role" name="role">
      <option value="ADMIN">Administrador</option>
      <option value="RECEPCIONIST">Recepcionista</option>
      <option value="GUEST">Huésped</option>
    </select>
  </div>

  <button type="submit">Guardar Usuario</button>
</form>
